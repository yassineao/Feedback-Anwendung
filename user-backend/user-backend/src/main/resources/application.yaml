spring:
  application:
    name: user-backend
  config:
    import: optional:file:.env[.properties]
  docker:
    compose:
      enabled: false
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate

supabase:
  url: ${SUPABASE_URL}
  publishable-key: ${SUPABASE_PUBLISHABLE_KEY}
  secret-key: ${SUPABASE_SECRET_KEY}
  jwks-url: ${SUPABASE_JWKS_URL}

jwt:
  secret: ${JWT_SECRET:${SUPABASE_SECRET_KEY}}
